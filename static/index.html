<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/0000">
                    <path d="M4 16L8.586 11.414C8.96106 11.0391 9.46967 10.8284 10 10.8284C10.5303 10.8284 11.0389 11.0391 11.414 11.414L16 16M14 14L15.586 12.414C15.9611 12.0391 16.4697 11.8284 17 11.8284C17.5303 11.8284 18.0389 12.0391 18.414 12.414L20 14M14 8H14.01M6 20H18C18.5304 20 19.0391 19.7893 19.4142 19.4142C19.7893 19.0391 20 18.5304 20 18V6C20 5.46957 19.7893 4.96086 19.4142 4.58579C19.0391 4.21071 18.5304 4 18 4H6C5.46957 4 4.96086 4.21071 4.58579 4.58579C4.21071 4.96086 4 5.46957 4 6V18C4 18.5304 4.21071 19.0391 4.58579 19.4142C4.96086 19.7893 5.46957 20 6 20Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Compliance Portal</span>
            </div>
            <button class="add-property-btn" id="addPropertyBtn">
                + New Property
            </button>
        </header>

        <main class="content">
            <div class="sidebar">
                <h2>Properties</h2>
                <div class="properties-list" id="propertiesList">
                    <!-- Properties will be injected here via JS -->
                    <div class="loading-state">Loading properties...</div>
                </div>
            </div>

            <div class="main-view" id="mainView">
                <div class="empty-state" id="emptyState">
                    <h3>Select a property</h3>
                    <p>Choose a property from the sidebar to view its photos, or add a new one to get started.</p>
                </div>
                
                <div class="property-details hidden" id="propertyDetails">
                    <div class="property-header">
                        <h1 id="selectedPropertyName">Property ID</h1>
                        <p class="property-address" id="selectedPropertyAddress">Address loading...</p>
                        
                        <div class="action-bar">
                            <button class="primary-btn" id="addImageBtn">+ Add Photo Pair</button>
                        </div>
                    </div>
                    
                    <div class="gallery-grid" id="galleryGrid">
                        <!-- Image pairs will be injected here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Modals -->
        <div class="modal hidden" id="propertyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Property</h3>
                    <button class="close-btn" id="closePropertyModal">&times;</button>
                </div>
                <form id="propertyForm">
                    <div class="form-group">
                        <label for="propIdInput">Property ID</label>
                        <input type="text" id="propIdInput" required placeholder="e.g. PROP-1234">
                    </div>
                    <div class="form-group">
                        <label for="propAddressInput">Address</label>
                        <input type="text" id="propAddressInput" required placeholder="123 Main St, City">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="secondary-btn" id="cancelPropertyBtn">Cancel</button>
                        <button type="submit" class="primary-btn">Save Property</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="modal hidden" id="imageModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add Photo Pair</h3>
                    <button class="close-btn" id="closeImageModal">&times;</button>
                </div>
                <form id="imageForm">
                    <div class="form-group">
                        <label for="compIdInput">Compliance ID</label>
                        <input type="text" id="compIdInput" required placeholder="e.g. COMP-998">
                    </div>
                    <div class="form-group">
                        <label for="origUrlInput">Original Image URL</label>
                        <input type="url" id="origUrlInput" required placeholder="https://example.com/image.jpg">
                    </div>
                    <div class="form-group">
                        <label for="editedUrlInput">Edited/Compliance Image URL</label>
                        <input type="url" id="editedUrlInput" required placeholder="https://example.com/image-edited.jpg">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="secondary-btn" id="cancelImageBtn">Cancel</button>
                        <button type="submit" class="primary-btn">Add Pair</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <script src="/app.js"></script>
</body>
</html>
